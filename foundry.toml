[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# Remappings live in remappings.txt (read by both forge and the hardhat-foundry plugin).
fs_permissions = [{ access = "read-write", path = "./deployments" }]
# Hardhat 전용 또는 mock 기반 스크립트 — Foundry 컴파일에서 제외
skip = [
    "src/libraries/PeripheryArtifacts.sol",
    "src/libraries/OzArtifacts.sol",
    "script/Deploy.s.sol",
    "script/DemoScenario.s.sol",
    "script/CapitalLifecycle.s.sol",
    "script/SeedDemo.s.sol",
]

[fuzz]
runs = 1000

[invariant]
runs = 256
depth = 50
fail_on_revert = false

# ── Environment profiles (single codebase, switch with no edits) — see docs/40·docs/50 ──
[profile.local-fork]      # integration: forked real GMX
[profile.gmx-devnet]      # demo baseline: GMX testnet
[profile.mainnet-stage]   # rehearsal: real GMX + Chainlink

[profile.ci]
verbosity = 3
fuzz = { runs = 2000 }
invariant = { runs = 512, depth = 64 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
